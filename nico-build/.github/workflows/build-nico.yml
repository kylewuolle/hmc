# Builds and pushes a multi-arch NICo container image to GHCR.
#
# Triggers:
#   - Push of a version tag (v*)  → builds and publishes the release image
#   - workflow_dispatch           → manual trigger with configurable inputs
#
# Output:
#   ghcr.io/<owner>/nico/nico:<tag>-amd64   (arch-tagged, per-job)
#   ghcr.io/<owner>/nico/nico:<tag>-arm64   (arch-tagged, per-job)
#   ghcr.io/<owner>/nico/nico:<tag>         (multi-arch manifest, final job)
#
# Note: when this directory becomes its own repository, move .github/ to the
# repo root and remove the `working-directory: nico-build` lines.

name: Build and push NICo image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      repo_ref:
        description: 'infra-controller-core branch/tag to build'
        required: true
        default: 'main'
      image_tag:
        description: 'Image tag (defaults to the triggering tag or workflow ref)'
        required: false

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_REPO: nico/nico
  # Pin the source repo ref: for tag pushes use the same tag; for manual runs
  # use the workflow input.
  REPO_REF: ${{ inputs.repo_ref || github.ref_name }}
  IMAGE_TAG: ${{ inputs.image_tag || github.ref_name }}

jobs:
  # ---------------------------------------------------------------------------
  # Build one arch-tagged image per runner. The two jobs run in parallel.
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest        # GitHub-hosted x86_64 runner
          - arch: arm64
            runner: ubuntu-24.04-arm     # GitHub-hosted arm64 runner
    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout KCM repo (contains nico-build/)
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Buildx is required for --mount=type=cache and GHA layer caching.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Cache the two intermediate containers (builder + runtime) in GHA cache.
      # Each arch gets its own cache key via the matrix.arch suffix.
      # The release image itself is not cached here — it's pushed directly.
      - name: Build and push ${{ matrix.arch }} image
        working-directory: nico-build
        run: make build-push
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_REPO: ${{ env.IMAGE_REPO }}
          ARCH: ${{ matrix.arch }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          REPO_REF: ${{ env.REPO_REF }}
          # GHA layer cache: keyed per arch so amd64 and arm64 don't share
          # intermediate layers (build-container, runtime-container).
          DOCKER_BUILD_EXTRA: >-
            --cache-from type=gha,scope=nico-${{ matrix.arch }}
            --cache-to   type=gha,scope=nico-${{ matrix.arch }},mode=max

  # ---------------------------------------------------------------------------
  # Combine the two arch images into a single multi-arch manifest.
  # Runs only after both build jobs succeed.
  # ---------------------------------------------------------------------------
  manifest:
    name: Publish multi-arch manifest
    needs: build
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
      - name: Checkout KCM repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        working-directory: nico-build
        run: make manifest
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_REPO: ${{ env.IMAGE_REPO }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: Print published image
        working-directory: nico-build
        run: make print-manifest-image
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_REPO: ${{ env.IMAGE_REPO }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
