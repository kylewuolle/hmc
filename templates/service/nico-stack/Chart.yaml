apiVersion: v2
name: nico-stack
description: >
  Infrastructure chart for the Nico (NCX AI Lab) stack:
  HashiCorp Vault (with PKI, KV, and Kubernetes auth) and PostgreSQL.
  Post-install Jobs handle Vault initialization, unsealing, and
  engine/policy/auth configuration automatically.
  Deploy alongside the nico-app ServiceTemplate (git chartSource) which
  installs the Nico application from NVIDIA/ncx-infra-controller-core.
type: application
version: 0.1.20
appVersion: "0.1.1"
dependencies:
  - name: vault
    version: "0.29.1"
    repository: https://helm.releases.hashicorp.com
    condition: vault.enabled
  - name: postgresql
    version: "12.12.10"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
