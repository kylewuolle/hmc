# ---------------------------------------------------------------------------
# Network / MetalLB
# ---------------------------------------------------------------------------
metallb:
  # Set to false if MetalLB resources are managed outside this chart
  enabled: true
  # CIDR for the MetalLB IPAddressPool
  ipAddressPool: "172.31.0.1/24"
  # Static VIP for the Vault UI LoadBalancer Service
  vaultIP: "172.31.0.82"

# ---------------------------------------------------------------------------
# Namespace & release identity
# ---------------------------------------------------------------------------
# Kubernetes namespace for all Nico resources
nicoNamespace: nico
# Name of the cert-manager Issuer in nicoNamespace that signs Nico certs via Vault PKI
nicoIssuer: vault-forge-issuer

# SSH host key for carbide-ssh-console-rs (base64-encoded ed25519 private key)
# Generate with: ssh-keygen -t ed25519 -N '' -f /tmp/ssh_host_ed25519_key && base64 -w0 /tmp/ssh_host_ed25519_key
sshConsoleHostKey: ""

# ---------------------------------------------------------------------------
# Vault setup (paths, roles, policies)
# These values are used by post-install Jobs to configure Vault engines.
# They must match the values set in the nico-app ServiceTemplate helmValues.
# ---------------------------------------------------------------------------
vaultSetup:
  image: alpine/k8s:1.31.4
  kubernetesMountPath: kubernetes/
  certManagerRoleName: nico-cert-manager
  # PKI engine path (trailing slash required)
  pkiMount: nico/pki/
  pkiRoleName: nico-nico-role-pki
  pkiPolicyName: nico-nico-policy-pki
  # KV v2 engine for application machine credentials
  kvMount: nico/kv/
  kvPolicyName: nico-nico-policy-kv
  # Separate KV v2 used only for generated PostgreSQL credentials
  k8sKvMount: nico/kv-k8s/

# ---------------------------------------------------------------------------
# Database
# ---------------------------------------------------------------------------
database:
  # Defaults to postgresql.<nicoNamespace>.svc.cluster.local; override if external
  host: "nico-stack-postgresql.vault.svc.cluster.local"
  name: nico
  pvSize: 5G
  port: "5432"

# ---------------------------------------------------------------------------
# Vault subchart values
# See https://github.com/hashicorp/vault-helm for full reference.
# ---------------------------------------------------------------------------
vault:
  fullnameOverride: vault
  enabled: true
  global:
    enabled: true
    tlsDisable: false
  injector:
    enabled: false
  server:
    extraEnvironmentVars:
      VAULT_CACERT: /vault/userconfig/vault-tls/ca.crt
    volumes:
      - name: userconfig-vault-tls
        secret:
          defaultMode: 420
          secretName: vault-tls
    volumeMounts:
      - mountPath: /vault/userconfig/vault-tls
        name: userconfig-vault-tls
        readOnly: true
    standalone:
      enabled: true
      config: |
        listener "tcp" {
          address = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_cert_file = "/vault/userconfig/vault-tls/tls.crt"
          tls_key_file  = "/vault/userconfig/vault-tls/tls.key"
          tls_client_ca_file = "/vault/userconfig/vault-tls/ca.crt"
        }
        storage "file" {
          path = "/vault/data"
        }
        ui = true
        disable_mlock = true
    dataStorage:
      enabled: false
  # Vault UI is exposed via a separate LoadBalancer Service in this chart
  # (see templates/vault-ui-service.yaml) so the subchart UI service is disabled.
  ui:
    enabled: false

# ---------------------------------------------------------------------------
# PostgreSQL subchart values (Bitnami)
# See https://github.com/bitnami/charts/tree/main/bitnami/postgresql
# Credentials are generated by vault-configure-job and injected post-install;
# these values are overridden at Job time via kubectl patch.
# ---------------------------------------------------------------------------
postgresql:
  enabled: true
  image:
    repository: bitnamilegacy/postgresql
  auth:
    postgresPassword: ""   # populated by vault-configure-job
    database: nico
    username: ""           # populated by vault-configure-job
    password: ""           # populated by vault-configure-job
  primary:
    persistence:
      enabled: false
  service:
    type: ClusterIP
    ports:
      postgresql: "5432"
  tls:
    enabled: true
    certificatesSecret: nico-postgresql-certificate
    certFilename: tls.crt
    certKeyFilename: tls.key
  volumePermissions:
    enabled: true
    image:
      pullPolicy: IfNotPresent
      repository: bitnamilegacy/os-shell

# NOTE: Nico application values live in the nico-app ServiceTemplate.
# See templates/provider/kcm-templates/files/templates/nico-app-0-1-1.yaml
