# ServiceAccount used by vault-init-job and vault-configure-job.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nico-setup
  namespace: {{ .Values.nicoNamespace }}
  labels:
    {{- include "nico-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
---
# ClusterRole granting the setup jobs access to the resources they patch.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nico-setup
  labels:
    {{- include "nico-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
  # Read root CA from cert-manager namespace
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["nico-root-secret"]
    verbs: ["get"]
    # Note: resourceNames filter requires specifying the namespace via ClusterRoleBinding
  # Manage vault seal-keys secret in vault namespace
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch"]
  # Patch Issuer caBundle in nico namespace after PKI is ready
  - apiGroups: ["cert-manager.io"]
    resources: ["issuers"]
    verbs: ["get", "patch"]
  # Restart Deployments/StatefulSets after credentials are injected
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nico-setup
  labels:
    {{- include "nico-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
subjects:
  - kind: ServiceAccount
    name: nico-setup
    namespace: {{ .Values.nicoNamespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nico-setup
