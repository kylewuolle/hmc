# TLS certificate for the Vault server, signed by nico-issuer.
# The Vault Helm subchart is configured to mount the resulting Secret (vault-tls).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault
  namespace: vault
  labels:
    {{- include "nico-stack.labels" . | nindent 4 }}
spec:
  secretName: vault-tls
  privateKey:
    algorithm: ECDSA
    size: 384
  duration: 2160h   # 90d
  renewBefore: 360h # 15d
  isCA: false
  usages:
    - digital signature
    - key encipherment
  commonName: Nico vault
  dnsNames:
    - "*.vault"
    - "*.vault.vault"
    - "*.vault.vault.svc"
    - "*.vault.vault.svc.cluster.local"
    - "vault.vault.svc.cluster.local"
  ipAddresses:
    - "127.0.0.1"
    - {{ .Values.metallb.vaultIP | quote }}
  issuerRef:
    name: nico-issuer
    kind: ClusterIssuer
    group: cert-manager.io
