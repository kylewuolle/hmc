# TLS certificate for PostgreSQL, signed by the Vault-backed Issuer.
# Will be provisioned once vault-configure-job makes the Issuer functional.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nico-postgresql-certificate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nico-stack.labels" . | nindent 4 }}
spec:
  commonName: carbide-api-user
  secretName: nico-postgresql-certificate
  issuerRef:
    kind: ClusterIssuer
    name: nico-issuer
  dnsNames:
    - {{ include "nico-stack.dbHost" . | quote }}
  ipAddresses:
    - "127.0.0.1"
  privateKey:
    algorithm: ECDSA
    size: 384
