# Expose the Vault UI via MetalLB LoadBalancer.
# The vault subchart UI service is disabled (vault.ui.enabled: false); this
# Service gives us a single, named IP from the MetalLB pool.
apiVersion: v1
kind: Service
metadata:
  name: vault-ui-lb
  namespace: vault
  labels:
    {{- include "nico-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: vault-ui
spec:
  type: LoadBalancer
  loadBalancerIP: {{ .Values.metallb.vaultIP | quote }}
  externalTrafficPolicy: Local
  ports:
    - name: https
      port: 443
      targetPort: 8200
      protocol: TCP
  selector:
    app.kubernetes.io/name: vault
    component: server
