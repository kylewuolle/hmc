# Self-signed bootstrap issuer used only to sign the root CA certificate.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: nico-root-issuer
  labels:
    {{- include "nico-stack.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
# Root CA certificate stored in cert-manager namespace.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nico-root-ca
  namespace: cert-manager
  labels:
    {{- include "nico-stack.labels" . | nindent 4 }}
spec:
  isCA: true
  commonName: Nico Root CA
  secretName: nico-root-secret
  usages:
    - digital signature
    - cert sign
    - crl sign
  privateKey:
    algorithm: ECDSA
    size: 384
  issuerRef:
    name: nico-root-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
# Issuing ClusterIssuer backed by the root CA for cluster-wide TLS.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: nico-issuer
  labels:
    {{- include "nico-stack.labels" . | nindent 4 }}
spec:
  ca:
    secretName: nico-root-secret
