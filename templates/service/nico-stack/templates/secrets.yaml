{{- $ns := .Values.nicoNamespace }}
# CA bundle placeholder — vault-init-job patches this with the real CA from
# cert-manager's nico-root-secret once it is provisioned.
apiVersion: v1
kind: Secret
metadata:
  name: forge-roots
  namespace: {{ $ns }}
  labels:
    {{- include "nico-stack.labels" . | nindent 4 }}
type: Opaque
data:
  ca.crt: ""
---
# Same CA bundle under the name expected by nico-api (hardcoded volume mount).
apiVersion: v1
kind: Secret
metadata:
  name: nico-roots
  namespace: {{ $ns }}
  labels:
    {{- include "nico-stack.labels" . | nindent 4 }}
type: Opaque
data:
  ca.crt: ""
---
# SSH host key for carbide-ssh-console-rs.
apiVersion: v1
kind: Secret
metadata:
  name: ssh-host-key
  namespace: {{ $ns }}
  labels:
    {{- include "nico-stack.labels" . | nindent 4 }}
type: Opaque
data:
  # Provide as a base64-encoded ed25519 private key via .Values.sshConsoleHostKey
  ssh_host_ed25519_key: {{ .Values.sshConsoleHostKey | quote }}
---
# Vault token placeholder — carbide-api uses K8s auth so this stays empty.
apiVersion: v1
kind: Secret
metadata:
  name: carbide-vault-token
  namespace: {{ $ns }}
  labels:
    {{- include "nico-stack.labels" . | nindent 4 }}
type: Opaque
data:
  token: ""
---
# Same placeholder under the nico-* name expected by newer chart versions.
apiVersion: v1
kind: Secret
metadata:
  name: nico-vault-token
  namespace: {{ $ns }}
  labels:
    {{- include "nico-stack.labels" . | nindent 4 }}
type: Opaque
data:
  token: ""
---
# AppRole token placeholder (optional: true in nico-api deployment).
apiVersion: v1
kind: Secret
metadata:
  name: nico-vault-approle-tokens
  namespace: {{ $ns }}
  labels:
    {{- include "nico-stack.labels" . | nindent 4 }}
type: Opaque
data: {}
---
# PostgreSQL credentials placeholder — vault-configure-job patches this with
# credentials generated by Vault password policies.
apiVersion: v1
kind: Secret
metadata:
  name: forge-system.carbide.forge-pg-cluster.credentials
  namespace: {{ $ns }}
  labels:
    {{- include "nico-stack.labels" . | nindent 4 }}
type: Opaque
data:
  username: ""
  password: ""
  host: {{ include "nico-stack.dbHost" . | b64enc | quote }}
  port: {{ .Values.database.port | b64enc | quote }}
  dbname: {{ .Values.database.name | b64enc | quote }}
  uri: ""
