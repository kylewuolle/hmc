{{- $roleName := .Values.vaultSetup.certManagerRoleName }}
{{- $ns := .Values.nicoNamespace }}
# ServiceAccount that cert-manager uses to obtain projected tokens for Vault K8s auth.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $roleName }}
  namespace: {{ $ns }}
  labels:
    {{- include "nico-stack.labels" . | nindent 4 }}
---
# Allow the cert-manager ServiceAccount to create tokens for this SA.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $roleName }}
  namespace: {{ $ns }}
  labels:
    {{- include "nico-stack.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    resourceNames: [{{ $roleName | quote }}]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $roleName }}
  namespace: {{ $ns }}
  labels:
    {{- include "nico-stack.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: cert-manager
    namespace: cert-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $roleName }}
