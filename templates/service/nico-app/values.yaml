## =============================================================================
## NICo Bare Metal Manager — Umbrella Helm Chart (KCM wrapper)
## =============================================================================
## Overrides for deploying alongside nico-stack in a KCM-managed cluster.
## nico-stack creates: vault-cluster-info, forge-system-carbide-database-config,
## forge-system.carbide.forge-pg-cluster.credentials, carbide-vault-token,
## nico-roots, nico-vault-token, ssh-host-key, forge-roots, vault-forge-issuer.
##
## REQUIRED: set global.image.repository and global.image.tag before deploying.
## =============================================================================

global:
  ## REQUIRED — set to the NICo container image location.
  ## e.g. repository: nico/nico  tag: v0.7.0-rc07
  image:
    repository: ""
    tag: ""
    pullPolicy: IfNotPresent

  imagePullSecrets: []

  ## Use the namespaced Issuer created by nico-stack (not a ClusterIssuer).
  certificate:
    duration: 720h0m0s
    renewBefore: 360h0m0s
    privateKey:
      algorithm: ECDSA
      size: 384
    issuerRef:
      kind: Issuer
      name: vault-forge-issuer
      group: cert-manager.io

  spiffe:
    trustDomain: nico.local

  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: site-controller

## ---------------------------------------------------------------------------
## nico-api — Core API server
## ---------------------------------------------------------------------------
nico-api:
  enabled: true
  automountServiceAccountToken: true

  env:
    ## Must match vaultSetup.pkiRoleName in nico-stack values.
    VAULT_PKI_ROLE_NAME: "nico-nico-role-pki"
    RUST_BACKTRACE: "full"
    RUST_LIB_BACKTRACE: "0"

  ## Wire up to secrets/configmaps created by nico-stack.
  envFrom:
    vaultApproleTokens:
      secretName: nico-vault-approle-tokens
    vaultToken:
      secretName: carbide-vault-token
    vaultClusterInfo:
      configMapName: vault-cluster-info
    databaseCredentials:
      secretName: forge-system.carbide.forge-pg-cluster.credentials
    databaseConfig:
      configMapName: forge-system-carbide-database-config
    nicoWebHostname:
      configMapName: nico-web-api-hostname

  ## Leave vaultClusterInfo and databaseConfig empty so nico-api does NOT
  ## recreate those ConfigMaps (nico-stack already owns them).
  vaultClusterInfo: {}
  databaseConfig: {}

  ## Minimal site config for docker/kind development.
  siteConfig:
    enabled: true
    nicoApiSiteConfig: |
      initial_domain_name = "forge.local"
      bypass_rbac = true
      dhcp_servers = []
      route_servers = []
      attestation_enabled = false

      [auth]
      permissive_mode = true

      [machine_validation_config]
      enabled = false

      [pools.lo-ip]
      type = "ipv4"
      ranges = [{ start = "10.244.0.1", end = "10.244.255.254" }]

      [pools.vlan-id]
      type = "integer"
      ranges = [{ start = "100", end = "501" }]

      [pools.vni]
      type = "integer"
      ranges = [{ start = "1024500", end = "1024550" }]

      [pools.vpc-vni]
      type = "integer"
      ranges = [{ start = "2024500", end = "2024550" }]

      [networks.admin]
      type = "admin"
      prefix = "192.168.64.0/18"
      gateway = "192.168.64.1"
      mtu = 9000
      reserve_first = 2

## ---------------------------------------------------------------------------
## Subcharts disabled by default for docker/kind — enable per environment.
## ---------------------------------------------------------------------------
nico-bmc-proxy:
  enabled: false

nico-dhcp:
  enabled: false

nico-dns:
  enabled: false

nico-dsx-exchange-consumer:
  enabled: false

nico-flow:
  enabled: false

nico-hardware-health:
  enabled: false

nico-pxe:
  enabled: false

nico-ssh-console-rs:
  enabled: false

unbound:
  enabled: false
