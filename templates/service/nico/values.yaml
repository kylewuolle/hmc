# ---------------------------------------------------------------------------
# Dev mode — override to true in dev ClusterDeployments
# Default is false (production-safe). When true: vault auto-inits on HTTP, no TLS,
# static PostgreSQL credentials, vault-forge-issuer uses HTTP.
# ---------------------------------------------------------------------------
devMode: false

global:
  devMode: false
  imagePullSecrets: []

imagePullSecret:
  name: ""
  registry: ""
  username: ""
  password: ""


metallb:
  ipAddressPool: "172.31.0.1/24"
  vaultIP: "172.31.0.82"


vaultSetup:
  image: alpine/k8s:1.31.4
  kubernetesMountPath: kubernetes/
  certManagerRoleName: nico-cert-manager
  pkiMount: nico/pki/
  pkiRoleName: nico-nico-role-pki
  pkiPolicyName: nico-nico-policy-pki
  kvMount: nico/kv/
  kvPolicyName: nico-nico-policy-kv
  k8sKvMount: nico/kv-k8s/

nicoIssuer: vault-forge-issuer

sshConsoleHostKey: ""


database:
  name: nico
  pvSize: 5G
  port: "5432"


vault:
  enabled: true
  fullnameOverride: vault
  global:
    enabled: true
    tlsDisable: false
  injector:
    enabled: false
  server:
    dev:
      enabled: false
      devRootToken: "root"
    standalone:
      enabled: true
      config: |
        storage "file" {
          path = "/vault/data"
        }
        ui = true
        disable_mlock = true
    dataStorage:
      enabled: true
      size: 1Gi
  ui:
    enabled: false

postgresql:
  enabled: true
  fullnameOverride: nico-postgresql
  image:
    repository: bitnamilegacy/postgresql
  auth:
    postgresPassword: "devpassword"
    database: nico
    username: "nico"
    password: "devpassword"
  primary:
    persistence:
      enabled: false
  service:
    type: ClusterIP
    ports:
      postgresql: "5432"
  tls:
    enabled: true
    certificatesSecret: nico-postgresql-certificate
    certFilename: tls.crt
    certKeyFilename: tls.key
  volumePermissions:
    enabled: true
    image:
      pullPolicy: IfNotPresent
      repository: bitnamilegacy/os-shell

nico-app:
  enabled: true
  global:
    image:
      repository: kcm-local-registry:5000/nico/nico
      tag: "0.9.1-amd64"
      pullPolicy: IfNotPresent
