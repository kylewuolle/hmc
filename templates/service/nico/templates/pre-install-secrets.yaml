# Pre-install hooks to create placeholder secrets and configmaps before nico-api-migrate runs (weight -5).
# vault-configure-job (post-install weight 1) will patch these with real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: forge-system.carbide.forge-pg-cluster.credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nico.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-8"
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
data:
  username: {{ "nico" | b64enc | quote }}
  password: {{ "devpassword" | b64enc | quote }}
  host: {{ include "nico.postgresHost" . | b64enc | quote }}
  port: {{ .Values.database.port | b64enc | quote }}
  dbname: {{ .Values.database.name | b64enc | quote }}
  uri: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: forge-roots
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nico.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-8"
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
data:
  ca.crt: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: nico-roots
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nico.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-8"
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
data:
  ca.crt: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forge-system-carbide-database-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nico.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-8"
    helm.sh/hook-delete-policy: before-hook-creation
data:
  DB_HOST: {{ include "nico.postgresHost" . | quote }}
  DB_PORT: {{ .Values.database.port | quote }}
  DB_NAME: {{ .Values.database.name | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-cluster-info
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nico.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-8"
    helm.sh/hook-delete-policy: before-hook-creation
data:
  VAULT_SERVICE: {{ include "nico.vaultAddr" . | quote }}
  FORGE_VAULT_MOUNT: {{ .Values.vaultSetup.kvMount | trimSuffix "/" | quote }}
  FORGE_VAULT_PKI_MOUNT: {{ .Values.vaultSetup.pkiMount | trimSuffix "/" | quote }}
  NICO_VAULT_MOUNT: {{ .Values.vaultSetup.kvMount | trimSuffix "/" | quote }}
  NICO_VAULT_PKI_MOUNT: {{ .Values.vaultSetup.pkiMount | trimSuffix "/" | quote }}
