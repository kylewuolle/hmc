{{- $setupImage := .Values.vaultSetup.image }}
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nico.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault-init
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: nico-setup
      restartPolicy: OnFailure
      containers:
        - name: vault-init
          image: {{ $setupImage | quote }}
          env:
            - name: VAULT_ADDR
              value: {{ include "nico.vaultAddr" . | quote }}
            - name: VAULT_CACERT
              value: /tmp/vault-ca.crt
            - name: NICO_NS
              value: {{ .Release.Namespace | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              KUBEAPI="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}"
              SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              K8S_CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

              k8s_get() {
                curl -sf --cacert "$K8S_CA" \
                  -H "Authorization: Bearer $SA_TOKEN" \
                  "${KUBEAPI}$1"
              }
              k8s_put() {
                curl -sf --cacert "$K8S_CA" \
                  -H "Authorization: Bearer $SA_TOKEN" \
                  -H "Content-Type: application/merge-patch+json" \
                  -X PATCH "${KUBEAPI}$1" -d "$2"
              }
              k8s_post() {
                curl -sf --cacert "$K8S_CA" \
                  -H "Authorization: Bearer $SA_TOKEN" \
                  -H "Content-Type: application/json" \
                  -X POST "${KUBEAPI}$1" -d "$2"
              }

              {{- if not .Values.devMode }}
              # --- Step 1: wait for vault-tls secret and extract CA ---
              echo "[1/5] Waiting for vault-tls secret..."
              until k8s_get "/api/v1/namespaces/${NICO_NS}/secrets/vault-tls" | grep -q '"ca.crt"'; do
                echo "  vault-tls not ready, retrying in 10s..."
                sleep 10
              done

              echo "[1/5] Extracting Vault CA..."
              k8s_get "/api/v1/namespaces/cert-manager/secrets/nico-root-secret" \
                | jq -r '.data["ca.crt"]' | base64 -d > /tmp/vault-ca.crt
              {{- else }}
              echo "[1/5] devMode: skipping vault-tls wait (TLS disabled)."
              {{- end }}

              # --- Step 2: wait for Vault to respond ---
              echo "[2/5] Waiting for Vault API..."
              until VAULT_HTTP=$(curl -s {{ if .Values.devMode }}{{ else }}--cacert /tmp/vault-ca.crt {{ end }}--max-time 5 \
                  -o /dev/null -w "%{http_code}" \
                  "${VAULT_ADDR}/v1/sys/health" 2>/dev/null) && \
                  echo "$VAULT_HTTP" | grep -qE "^(200|429|472|473|501|503)$"; do
                echo "  Vault not reachable (HTTP ${VAULT_HTTP:-none}), retrying in 10s..."
                sleep 10
              done

              {{- if not .Values.devMode }}
              # --- Step 3: check if already initialized ---
              INITIALIZED=$(curl -sf --cacert /tmp/vault-ca.crt \
                "${VAULT_ADDR}/v1/sys/init" | jq -r '.initialized')

              if [ "$INITIALIZED" = "true" ]; then
                echo "[3/5] Vault already initialized — checking seal status..."
                SEALED=$(curl -sf --cacert /tmp/vault-ca.crt \
                  "${VAULT_ADDR}/v1/sys/seal-status" | jq -r '.sealed')
                if [ "$SEALED" = "true" ]; then
                  echo "  Vault is sealed — fetching stored unseal key..."
                  UNSEAL_KEY=$(k8s_get "/api/v1/namespaces/${NICO_NS}/secrets/vault-seal-keys" \
                    | jq -r '.data.unsealKey' | base64 -d)
                  if [ -z "$UNSEAL_KEY" ]; then
                    echo "  ERROR: unseal key not found in vault-seal-keys secret" >&2
                    exit 1
                  fi
                  curl -sf --cacert /tmp/vault-ca.crt -X PUT \
                    "${VAULT_ADDR}/v1/sys/unseal" \
                    -H "Content-Type: application/json" \
                    -d "{\"key\":\"$UNSEAL_KEY\"}"
                  echo "  Waiting for Vault to be unsealed and ready..."
                  until curl -sf --cacert /tmp/vault-ca.crt --max-time 5 \
                      "${VAULT_ADDR}/v1/sys/health" 2>/dev/null | grep -q '"sealed":false'; do
                    sleep 3
                  done
                  echo "  Vault unsealed."
                fi
              else
                echo "[3/5] Initializing Vault..."
                INIT_JSON=$(curl -sf --cacert /tmp/vault-ca.crt -X PUT \
                  "${VAULT_ADDR}/v1/sys/init" \
                  -H "Content-Type: application/json" \
                  -d '{"secret_shares":1,"secret_threshold":1}')
                UNSEAL_KEY=$(echo "$INIT_JSON" | jq -r '.keys_base64[0]')
                ROOT_TOKEN=$(echo "$INIT_JSON" | jq -r '.root_token')

                echo "[4/5] Storing seal keys..."
                UK="$(echo -n "$UNSEAL_KEY" | base64 | tr -d '\n')"
                RT="$(echo -n "$ROOT_TOKEN" | base64 | tr -d '\n')"
                k8s_post "/api/v1/namespaces/${NICO_NS}/secrets" \
                  "$(jq -n --arg uk "$UK" --arg rt "$RT" \
                    '{apiVersion:"v1",kind:"Secret",metadata:{name:"vault-seal-keys",namespace:"'"${NICO_NS}"'"},type:"Opaque",data:{unsealKey:$uk,rootToken:$rt}}')" \
                  2>/dev/null \
                  || k8s_put "/api/v1/namespaces/${NICO_NS}/secrets/vault-seal-keys" \
                    "$(jq -n --arg uk "$UK" --arg rt "$RT" '{data:{unsealKey:$uk,rootToken:$rt}}')"

                curl -sf --cacert /tmp/vault-ca.crt -X PUT \
                  "${VAULT_ADDR}/v1/sys/unseal" \
                  -H "Content-Type: application/json" \
                  -d "{\"key\":\"$UNSEAL_KEY\"}"
              fi
              {{- else }}
              echo "[3/5] devMode: Vault auto-initialized and unsealed — skipping init/unseal."
              {{- end }}

              {{- if not .Values.devMode }}
              # --- Step 5: patch CA bundle into forge-roots and nico-roots ---
              echo "[5/5] Patching CA bundle into secrets..."
              CA_B64=$(k8s_get "/api/v1/namespaces/cert-manager/secrets/nico-root-secret" \
                | jq -r '.data["ca.crt"]')
              k8s_put "/api/v1/namespaces/${NICO_NS}/secrets/forge-roots" \
                "{\"data\":{\"ca.crt\":\"$CA_B64\"}}"
              k8s_put "/api/v1/namespaces/${NICO_NS}/secrets/nico-roots" \
                "{\"data\":{\"ca.crt\":\"$CA_B64\"}}"
              {{- else }}
              echo "[5/5] devMode: skipping CA bundle patch (no PKI in devMode)."
              {{- end }}

              echo "vault-init complete."
