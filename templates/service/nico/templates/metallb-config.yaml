apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: nico-pool
  namespace: metallb
  labels:
    {{- include "nico.labels" . | nindent 4 }}
spec:
  addresses:
    - {{ .Values.metallb.ipAddressPool | quote }}
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: nico-l2
  namespace: metallb
  labels:
    {{- include "nico.labels" . | nindent 4 }}
spec:
  ipAddressPools:
    - nico-pool
