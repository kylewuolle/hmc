apiVersion: v2
name: nico
description: >
  Umbrella chart for the NICo (NVIDIA Infra Controller) platform.
  Deploys MetalLB, Vault, PostgreSQL, and the NICo application into a
  single namespace. Post-install Jobs handle Vault initialization and
  configuration automatically.
type: application
version: 0.1.10
appVersion: "0.9.1"
dependencies:
  - name: vault
    version: "0.29.1"
    repository: "https://helm.releases.hashicorp.com"
    condition: vault.enabled
  - name: postgresql
    version: "12.12.10"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: postgresql.enabled
  - name: nico-app
    version: "0.1.1"
    repository: ""
    condition: nico-app.enabled
